name: CI Pipeline

on:
  push:
    paths: ['**.py', '**.json', '**.sh', '.github/workflows/ci.yml']
  pull_request:
    paths: ['**.py', '**.json', '**.sh', '.github/workflows/ci.yml']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache Blender Binary
        id: cache-blender
        uses: actions/cache@v4
        with:
          path: env/Blender_4.5
          key: ${{ runner.os }}-blender-4.5.6

      - name: Bypass Large Asset Downloads
        run: |
          mkdir -p assets
          touch assets/starmap_2020_16k.exr

      - name: Setup Environment
        run: |
          chmod +x ./env/setup.sh
          ./env/setup.sh

      - name: Generate Minimal CI Assets
        run: |
          source ./env/activate.sh
          $BLENDER -b -P tests/create_ci_assets.py

      - name: Execute Native Blender Tests
        run: |
          source ./env/activate.sh
          $BLENDER -b -P tests/run_in_blender.py

      - name: Execute End-to-End Pipeline
        run: |
          source ./env/activate.sh
          CI=1 $BLENDER -b -P main.py -- --sweep_config_path configs/ci_test.json

      - name: Verify Output Artifacts
        run: |
          ls -la renders/*/GTAnnotations/NPZ/*.npz
          ls -la renders/*/images_raw/*.png